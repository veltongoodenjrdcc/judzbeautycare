<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Judz Beauty Care</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="assets/Favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Jost:wght@400;500;600&display=swap">
  <style>
    :root {
      --color-primary: #5A2396;
      --color-primary-deep: #3D1866;
      --color-accent: #D8B7E8;
      --color-ivory: #FAF7FD;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', -apple-system, sans-serif;
      background: var(--color-ivory);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      text-align: center;
      padding: 2rem;
    }
    .logo { height: 60px; width: auto; margin-bottom: 2.5rem; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: var(--color-primary-deep);
      margin-bottom: 0.5rem;
    }
    p {
      color: #6B5B7A;
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: var(--color-primary);
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.3s;
    }
    .btn:hover { background: var(--color-primary-deep); }
    .btn:focus-visible { outline: 3px solid var(--color-accent); outline-offset: 3px; }
  </style>
</head>
<body>
  <img src="assets/Logo.png" alt="Judz Beauty Care" class="logo" width="80" height="80">
  <h1>Page Not Found</h1>
  <p>The page you are looking for does not exist. Let us take you back to where the beauty is.</p>
  <a href="/" class="btn">Back to Home</a>
</body>
</html>
